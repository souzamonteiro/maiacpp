<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MaiaCpp WASM Runner</title>
  <style>
    body { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; margin: 24px; }
    .row { display: flex; gap: 8px; margin-bottom: 12px; }
    input { flex: 1; padding: 8px; }
    button { padding: 8px 14px; cursor: pointer; }
    #status { margin-bottom: 10px; color: #333; }
    pre { border: 1px solid #ddd; padding: 12px; min-height: 280px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>MaiaCpp WASM Runner</h1>
  <p>Run generated wasm files in browser with host printf support.</p>
  <div class="row">
    <input id="wasm-url" value="/out/browser/test.wasm" />
    <button id="run">Run</button>
  </div>
  <div id="status">Idle</div>
  <pre id="output"></pre>
  <script src="./run-wasm.js"></script>
</body>
</html>
