name: MaiaCpp Readiness

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Show toolchain
        run: |
          node --version
          npm --version
          python3 --version
          clang++ --version || g++ --version

      - name: Run release-readiness gate
        run: npm run ready:release
